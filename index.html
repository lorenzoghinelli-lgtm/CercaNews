<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>News Search Engine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>News Feed JSON</h1>
            <div class="search-bar">
                <input type="text" id="topicInput" placeholder="Es: Politica, Sport, Scienza...">
                <button onclick="searchNews()">Cerca</button>
            </div>
        </header>

        <main id="newsResults">
            <p class="placeholder">Digita qualcosa per iniziare la ricerca...</p>
        </main>
    </div>

    <script>
        async function searchNews() {
    const topic = document.getElementById('topicInput').value;
    const display = document.getElementById('newsResults');
    const apiKey = "2fc965128b004945be6fe8cbc6e8a745"; // La tua chiave direttamente qui
    
    if(!topic) return alert("Inserisci un argomento!");

    display.innerHTML = "<p>Caricamento in corso...</p>";

    // Chiamata diretta all'API senza passare per il PHP
    const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(topic)}&language=it&sortBy=publishedAt&apiKey=${apiKey}`;

    try {
        const response = await fetch(url);
        const data = await response.json();

        if(data.status !== "ok") {
            display.innerHTML = `<p class="error">Errore API: ${data.message}</p>`;
            return;
        }

        display.innerHTML = data.articles.map(art => `
            <article class="card">
                <small>${art.source.name} - ${new Date(art.publishedAt).toLocaleString()}</small>
                <h3>${art.title}</h3>
                <p>${art.description || 'Nessuna descrizione disponibile'}</p>
                <a href="${art.url}" target="_blank">Leggi di più</a>
            </article>
        `).join('');
    } catch (err) {
        display.innerHTML = "<p class='error'>Errore: l'API di NewsAPI potrebbe bloccare le richieste da browser su domini gratuiti.</p>";
    }
}
    </script>
</body>


</html>
