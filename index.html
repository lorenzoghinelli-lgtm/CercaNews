<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Hub - Versione GitHub</title>
    <style>
    :root {
        --primary: #2563eb;
        --bg: #f8fafc;
        --text: #1e293b;
        --accent: #3b82f6;
    }

    body { 
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
        background: var(--bg); 
        color: var(--text);
        margin: 0; 
        padding: 20px; 
        line-height: 1.6;
    }

    .container { max-width: 900px; margin: auto; }

    .header { 
        background: white; 
        padding: 40px 20px; 
        border-radius: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
        text-align: center; 
        margin-bottom: 40px;
        border: 1px solid #e2e8f0;
    }

    h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; color: #0f172a; }

    .search-box {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
    }

    input { 
        padding: 14px 20px; 
        width: 100%;
        max-width: 300px;
        border: 2px solid #e2e8f0; 
        border-radius: 12px; 
        font-size: 16px; 
        transition: all 0.3s ease;
    }

    input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

    button { 
        padding: 14px 28px; 
        background: var(--primary); 
        color: white; 
        border: none; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 600; 
        transition: transform 0.2s, background 0.2s;
    }

    button:hover { background: #1d4ed8; transform: translateY(-1px); }

    .card { 
        background: white; 
        padding: 24px; 
        margin-bottom: 20px; 
        border-radius: 16px; 
        border: 1px solid #e2e8f0;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .card:hover { 
        transform: translateY(-4px); 
        box-shadow: 0 12px 20px rgba(0,0,0,0.05); 
    }

    .source-name { 
        background: #eff6ff;
        color: var(--primary); 
        font-weight: 700; 
        font-size: 0.75rem; 
        text-transform: uppercase; 
        padding: 4px 12px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 12px;
    }

    .card h3 { margin: 0 0 10px 0; font-size: 1.25rem; color: #0f172a; line-height: 1.3; }

    .card p { color: #64748b; font-size: 0.95rem; margin-bottom: 18px; }

    .card a { 
        color: var(--primary); 
        text-decoration: none; 
        font-weight: 600; 
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
    }

    .card a:hover { text-decoration: underline; }

    .error { background: #fef2f2; color: #991b1b; padding: 20px; border-radius: 12px; border: 1px solid #fee2e2; }

    .loader { text-align: center; padding: 40px; color: #94a3b8; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🗞️ Aggregatore News</h1>
        <p>Digita <strong>politica</strong> o <strong>sport</strong></p>
        <input type="text" id="catInput" placeholder="Esempio: politica...">
        <button onclick="caricaNotizie()">Cerca</button>
    </div>

    <div id="display"></div>
</div>

<script>
async function caricaNotizie() {
    const query = document.getElementById('catInput').value.toLowerCase().trim();
    const display = document.getElementById('display');
    
    const fonti = {
        "politica": [
            "https://www.ansa.it/sito/notizie/politica/politica_rss.xml",
            "https://www.ilfattoquotidiano.it/politica/feed/",
            "https://ilmanifesto.it/feed/",
            "https://www.liberoquotidiano.it/rss/politica.xml",
            "https://www.repubblica.it/rss/politica/rss2.0.xml",
            "https://xml2.corriereobjects.it/rss/politica.xml"
        ],
        "sport": [
            "https://sport.sky.it/rss/sport_all.xml",
            "https://www.gazzetta.it/rss/home.xml",
            "https://www.corrieredellosport.it/rss/calcio",
            "https://www.rainews.it/rss/sport",
            "https://it.eurosport.com/rss.xml"
        ]
    };

    if (!fonti[query]) {
        display.innerHTML = '<div class="error">⚠️ Categoria non valida. Prova con "politica" o "sport".</div>';
        return;
    }

    display.innerHTML = '<p class="loader">Interrogando i feed (conversione XML in JSON)...</p>';

    let htmlContenuto = "";
    
    try {
        // Cicliamo su tutte le URL della categoria scelta
        for (const url of fonti[query]) {
            // Usiamo il servizio rss2json (gratuito) per bypassare il CORS e avere JSON
            const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
            
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.status === 'ok') {
                    data.items.slice(0, 3).forEach(item => { // Primi 3 articoli per ogni testata
                        htmlContenuto += `
                            <div class="card">
                                <div class="source-name">${data.feed.title || 'Fonte'}</div>
                                <h3>${item.title}</h3>
                                <p>${item.description.replace(/<[^>]*>?/gm, '').substring(0, 180)}...</p>
                                <a href="${item.link}" target="_blank">Leggi articolo →</a>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                console.warn("Impossibile caricare: " + url);
            }
        }
        
        display.innerHTML = htmlContenuto || '<div class="error">Nessuna notizia disponibile al momento.</div>';
        
    } catch (err) {
        display.innerHTML = '<div class="error">⚠️ Errore di connessione. Riprova.</div>';
    }
}
</script>

</body>
</html>
