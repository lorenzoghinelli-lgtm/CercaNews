<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed JSON</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        .search-row { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #results { margin-top: 30px; text-align: left; }
        .news-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .news-item h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .news-item a { color: #007bff; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .error-msg { background: #fee; color: #c00; padding: 10px; border-radius: 5px; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>News Feed JSON</h2>
    <div class="search-row">
        <input type="text" id="topic" placeholder="Es: Sport, Politica...">
        <button onclick="getNews()">Cerca</button>
    </div>
    <div id="results"></div>
</div>

<script>
async function getNews() {
    const topic = document.getElementById('topic').value;
    const resDiv = document.getElementById('results');
    const apiKey = "10c06e699933e0bea05ca53e6929f79f"; // La tua chiave GNews
    
    if(!topic) return;
    resDiv.innerHTML = "<em>Caricamento...</em>";

    // Nota l'uso di HTTPS e dei parametri corretti per GNews
    const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(topic)}&lang=it&country=it&max=5&token=${apiKey}`;

    try {
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`Errore HTTP: ${response.status}`);
        }

        const data = await response.json();

        if (data.articles && data.articles.length > 0) {
            resDiv.innerHTML = data.articles.map(art => `
                <div class="news-item">
                    <small>${art.source.name}</small>
                    <h3>${art.title}</h3>
                    <a href="${art.url}" target="_blank">Leggi notizia →</a>
                </div>
            `).join('');
        } else {
            resDiv.innerHTML = "Nessun risultato trovato.";
        }

    } catch (err) {
        resDiv.innerHTML = `<div class="error-msg">
            <strong>Errore:</strong> ${err.message}<br>
            Assicurati che la chiave API sia attiva e di non aver superato il limite giornaliero (100 ricerche).
        </div>`;
    }
}
</script>

</body>
</html>
