<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>News Search Engine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>News Feed JSON</h1>
            <div class="search-bar">
                <input type="text" id="topicInput" placeholder="Es: Politica, Sport, Scienza...">
                <button onclick="searchNews()">Cerca</button>
            </div>
        </header>

        <main id="newsResults">
            <p class="placeholder">Digita qualcosa per iniziare la ricerca...</p>
        </main>
    </div>

    <script>
        async function searchNews() {
    const topic = document.getElementById('topicInput').value;
    const display = document.getElementById('newsResults');
    
    // Usiamo GNews invece di NewsAPI perché è più permissivo con GitHub Pages
    // Registrati su gnews.io per una chiave se questa scade (è gratis)
    const apiKey = "677d85440786576856006e8909403f56"; 
    
    if(!topic) return alert("Inserisci un argomento!");

    display.innerHTML = "<p>Caricamento notizie in corso...</p>";

    // URL per GNews (ottimo per GitHub Pages)
    const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(topic)}&lang=it&token=${apiKey}`;

    try {
        const response = await fetch(url);
        const data = await response.json();

        if(!data.articles) {
            display.innerHTML = `<p class="error">Errore: ${data.errors ? data.errors[0] : 'Limite API raggiunto'}</p>`;
            return;
        }

        display.innerHTML = data.articles.map(art => `
            <article class="card">
                <small>${art.source.name} - ${new Date(art.publishedAt).toLocaleDateString()}</small>
                <h3>${art.title}</h3>
                <p>${art.description}</p>
                <a href="${art.url}" target="_blank">Leggi l'articolo originale &rarr;</a>
            </article>
        `).join('');

    } catch (err) {
        display.innerHTML = "<p class='error'>Errore di connessione. Riprova tra poco.</p>";
    }
}
    </script>
</body>


</html>
